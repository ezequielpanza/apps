name: Wander Travel scenarios

on:
  push:
    paths:
      - 'apps/wander-travel/**'
      - 'services/wander-web-acquisition/**'
      - '.github/workflows/wander-travel-scenarios.yml'
  pull_request:
    paths:
      - 'apps/wander-travel/**'
      - 'services/wander-web-acquisition/**'
      - '.github/workflows/wander-travel-scenarios.yml'
  workflow_dispatch:

jobs:
  scenarios:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run Wander scenarios
        run: node apps/wander-travel/tests/wander-scenarios.mjs

      - name: Run unified POI engine tests
        run: node apps/wander-travel/tests/poi-source-foundation.mjs

      - name: Run Wikidata connector tests
        run: node apps/wander-travel/tests/wikidata-connector.mjs

      - name: Run OpenStreetMap connector tests
        run: node apps/wander-travel/tests/openstreetmap-connector.mjs

      - name: Run POI consolidation tests
        run: node apps/wander-travel/tests/poi-consolidation.mjs

      - name: Run NearbyProvider field tests
        run: node apps/wander-travel/tests/nearby-provider.mjs

      - name: Run context dashboard test
        run: node apps/wander-travel/tests/context-dashboard.mjs

      - name: Run context dashboard configuration tests
        run: node apps/wander-travel/tests/context-dashboard-config.mjs

      - name: Check Browser Run worker syntax
        run: node --check services/wander-web-acquisition/src/index.js
