name: Wander Travel scenarios

on:
  push:
    paths:
      - 'apps/wander-travel/**'
      - '.github/workflows/wander-travel-scenarios.yml'
  pull_request:
    paths:
      - 'apps/wander-travel/**'
      - '.github/workflows/wander-travel-scenarios.yml'
  workflow_dispatch:

jobs:
  scenarios:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run Wander scenarios
        run: node apps/wander-travel/tests/wander-scenarios.mjs

      - name: Run unified POI engine tests
        run: node apps/wander-travel/tests/poi-source-foundation.mjs

      - name: Run Wikidata connector tests
        run: node apps/wander-travel/tests/wikidata-connector.mjs

      - name: Run OpenStreetMap connector tests
        run: node apps/wander-travel/tests/openstreetmap-connector.mjs

      - name: Run POI consolidation tests
        run: node apps/wander-travel/tests/poi-consolidation.mjs

      - name: Run NearbyProvider field tests
        run: node apps/wander-travel/tests/nearby-provider.mjs

      - name: Run exact current-place resolution tests
        run: node apps/wander-travel/tests/current-place-resolution.mjs

      - name: Run native background location tests
        run: node apps/wander-travel/tests/native-background-location.mjs

      - name: Run hybrid direction indicator tests
        run: |
          set -o pipefail
          node apps/wander-travel/tests/direction-indicator.mjs 2>&1 | tee direction-indicator-test.log

      - name: Upload direction test diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: wander-direction-test-diagnostics
          path: direction-indicator-test.log
          if-no-files-found: error
          retention-days: 3

      - name: Run context dashboard test
        run: node apps/wander-travel/tests/context-dashboard.mjs

      - name: Run context dashboard configuration tests
        run: node apps/wander-travel/tests/context-dashboard-config.mjs

      - name: Run human-readable context panel tests
        run: node apps/wander-travel/tests/context-panel-values.mjs

      - name: Run movement method tests
        run: node apps/wander-travel/tests/movement-method.mjs

      - name: Run simulator motion isolation tests
        run: node apps/wander-travel/tests/simulator-motion.mjs

      - name: Run session reconciliation tests
        run: node apps/wander-travel/tests/session-reconciliation.mjs

      - name: Verify travel log memory shell
        run: node apps/wander-travel/tests/travel-log-memory.mjs

      - name: Run companion arrival tests
        run: node apps/wander-travel/tests/companion-arrival.mjs

      - name: Run companion discovery tests
        run: node apps/wander-travel/tests/companion-discovery.mjs

      - name: Run navigation tests
        run: node apps/wander-travel/tests/navigation.mjs

      - name: Run walking route API tests
        run: node apps/wander-travel/tests/routes-api.mjs

      - name: Run companion interruption budget tests
        run: node apps/wander-travel/tests/companion-budget.mjs
