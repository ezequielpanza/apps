name: Deploy Contextum

on:
  push:
    branches:
      - main
    paths:
      - "apps/contextum/**"
      - ".github/workflows/deploy-contextum.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-contextum
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify source
        run: |
          test -f apps/contextum/index.html
          test -f apps/contextum/styles.css
          test -f apps/contextum/app.js
          test -f apps/contextum/manifest.webmanifest
          test -f apps/contextum/service-worker.js
          test -f apps/contextum/icons/icon.svg

      - name: Create Cloudflare Pages project
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx --yes wrangler@latest pages project create contextum \
            --production-branch=main || true

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx --yes wrangler@latest pages deploy apps/contextum \
            --project-name=contextum

      - name: Verify public URL
        run: |
          for attempt in {1..20}; do
            if curl --fail --silent --show-error https://contextum.pages.dev/ | grep -q "Contextum"; then
              exit 0
            fi
            sleep 3
          done
          echo "Public URL verification failed"
          exit 1

      - name: Record verified deployment
        run: |
          mkdir -p deploy-status
          VERIFIED_AT="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          cat > deploy-status/contextum.json <<EOF
          {
            "app": "contextum",
            "version": "0.1.0",
            "url": "https://contextum.pages.dev",
            "verified": true,
            "verified_at": "${VERIFIED_AT}"
          }
          EOF
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deploy-status/contextum.json
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "chore(contextum): record verified deployment"
          git push
