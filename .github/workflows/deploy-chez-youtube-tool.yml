name: Deploy Chez YouTube Tool

on:
  push:
    branches: [main]
    paths:
      - "apps/chez-youtube-tool/**"
      - ".github/workflows/deploy-chez-youtube-tool.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/chez-youtube-tool
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Validate source
        run: |
          npm run check
          npm test
          test -f public/index.html
          test -f src/index.js
          test -f migrations/0001_initial.sql

      - name: Ensure D1 database and prepare config
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          RESPONSE=$(curl -fsS \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/d1/database")
          DATABASE_ID=$(echo "$RESPONSE" | jq -r '.result[] | select(.name=="chez-youtube-tool") | .uuid' | head -n1)
          if [ -z "$DATABASE_ID" ]; then
            CREATE=$(curl -fsS -X POST \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              -H "Content-Type: application/json" \
              --data '{"name":"chez-youtube-tool"}' \
              "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/d1/database")
            DATABASE_ID=$(echo "$CREATE" | jq -r '.result.uuid')
          fi
          test -n "$DATABASE_ID"
          sed "s/REPLACE_WITH_D1_DATABASE_ID/$DATABASE_ID/g" wrangler.jsonc > wrangler.deploy.jsonc

      - name: Apply D1 migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler d1 migrations apply DB --remote --config wrangler.deploy.jsonc

      - name: Deploy Worker and PWA
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy --config wrangler.deploy.jsonc

      - name: Configure Worker secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          GOOGLE_CLIENT_ID: ${{ secrets.CHEZ_YOUTUBE_GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.CHEZ_YOUTUBE_GOOGLE_CLIENT_SECRET }}
          TOKEN_ENCRYPTION_KEY: ${{ secrets.CHEZ_YOUTUBE_TOKEN_ENCRYPTION_KEY }}
          GPT_SHARED_SECRET: ${{ secrets.CHEZ_YOUTUBE_GPT_SHARED_SECRET }}
          ALLOWED_EMAILS: ${{ secrets.CHEZ_YOUTUBE_ALLOWED_EMAILS }}
        run: |
          set -euo pipefail
          put_secret() {
            local name="$1"
            local value="$2"
            if [ -n "$value" ]; then
              printf '%s' "$value" | npx wrangler secret put "$name" --config wrangler.deploy.jsonc
            fi
          }
          put_secret GOOGLE_CLIENT_ID "$GOOGLE_CLIENT_ID"
          put_secret GOOGLE_CLIENT_SECRET "$GOOGLE_CLIENT_SECRET"
          put_secret TOKEN_ENCRYPTION_KEY "$TOKEN_ENCRYPTION_KEY"
          put_secret GPT_SHARED_SECRET "$GPT_SHARED_SECRET"
          put_secret ALLOWED_EMAILS "$ALLOWED_EMAILS"

      - name: Verify deployed health endpoint
        run: |
          sleep 5
          curl --fail --silent --show-error https://chez-youtube-tool.ezequielpanza.workers.dev/api/health
