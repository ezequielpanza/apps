name: Deploy Wander Travel

on:
  push:
    branches: [main]
    paths:
      - "apps/wander-travel/**"
      - ".github/workflows/deploy-wander-travel.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify source
        run: |
          test -s apps/wander-travel/index.html
          test -s apps/wander-travel/wander-ui.css
          test -s apps/wander-travel/wander-icons.svg
          test -s apps/wander-travel/wander-app-icon.svg
          test -s apps/wander-travel/manifest.webmanifest
          test -s apps/wander-travel/sw.js
          test -s apps/wander-travel/app.js
          test -s apps/wander-travel/runtime-context.js
          test -s apps/wander-travel/runtime-location.js
          test -s apps/wander-travel/runtime-context-panel.js
          test -s apps/wander-travel/runtime-topbar.js
          test -s apps/wander-travel/runtime-ui.js
          test -s apps/wander-travel/runtime-panel.js
          test -s apps/wander-travel/runtime-tracks.js
          test -s apps/wander-travel/runtime-simulator.js
          node --check apps/wander-travel/sw.js
          node --check apps/wander-travel/app.js
          node --check apps/wander-travel/runtime-context.js
          node --check apps/wander-travel/runtime-location.js
          node --check apps/wander-travel/runtime-context-panel.js
          node --check apps/wander-travel/runtime-topbar.js
          node --check apps/wander-travel/runtime-ui.js
          node --check apps/wander-travel/runtime-panel.js
          node --check apps/wander-travel/runtime-tracks.js
          node --check apps/wander-travel/runtime-simulator.js

      - name: Create Pages project
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler@latest pages project create wander-travel --production-branch=main || true

      - name: Publish
        working-directory: apps/wander-travel
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler@latest pages deploy . --project-name=wander-travel
