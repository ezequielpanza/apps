name: Deploy Wander Travel

on:
  push:
    branches: [main]
    paths:
      - "apps/wander-travel/**"
      - "imports/wander-clean/**"
      - ".github/workflows/deploy-wander-travel.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build source archive
        run: |
          cat imports/wander-clean/chunk00.b64 imports/wander-clean/chunk01.b64 imports/wander-clean/rem00.b64 imports/wander-clean/rem01.b64 imports/wander-clean/rem02.b64 imports/wander-clean/rem03a.txt imports/wander-clean/rem03b00.txt imports/wander-clean/rem03b01.txt imports/wander-clean/rem03b0200.txt > /tmp/source.b64
          cat imports/wander-clean/tailhex00.txt imports/wander-clean/tailhex01.txt imports/wander-clean/tailhex02a.txt imports/wander-clean/tailhex02b00.txt imports/wander-clean/tailhex02b01.txt imports/wander-clean/tailhex03.txt | xxd -r -p >> /tmp/source.b64
          base64 -d /tmp/source.b64 > /tmp/source.zip
          unzip -o /tmp/source.zip -d /tmp/wander-travel

      - name: Check source
        run: |
          test -f /tmp/wander-travel/index.html
          test -f /tmp/wander-travel/styles.css
          test -f /tmp/wander-travel/app.js

      - name: Create Pages project
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler@latest pages project create wander-travel --production-branch=main || true

      - name: Publish
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler@latest pages deploy /tmp/wander-travel --project-name=wander-travel
