name: Deploy Wander Travel

on:
  push:
    branches: [main]
    paths:
      - "apps/wander-travel/**"
      - ".github/workflows/deploy-wander-travel.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-wander-travel
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate temporary Overture extract for Nagua
        run: |
          python -m pip install --disable-pip-version-check overturemaps
          mkdir -p apps/wander-travel/data/overture
          overturemaps download \
            --bbox=-69.872,19.355,-69.834,19.390 \
            -t place \
            -f geojson \
            -o apps/wander-travel/data/overture/nagua-places.geojson
          test -s apps/wander-travel/data/overture/nagua-places.geojson

      - name: Verify app shell and local script references
        run: |
          test -s apps/wander-travel/index.html
          test -s apps/wander-travel/wander-ui.css
          test -s apps/wander-travel/wander-icons.svg
          test -s apps/wander-travel/wander-app-icon.svg
          test -s apps/wander-travel/manifest.webmanifest
          test -s apps/wander-travel/sw.js
          test -s apps/wander-travel/app.js
          test -s apps/wander-travel/runtime-version.js
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const root = 'apps/wander-travel';
          const html = fs.readFileSync(path.join(root, 'index.html'), 'utf8');
          const scripts = [...html.matchAll(/<script\s+[^>]*src=["']([^"']+)["']/g)]
            .map((match) => match[1].split('?')[0])
            .filter((src) => !/^https?:\/\//.test(src));
          const missing = scripts.filter((src) => !fs.existsSync(path.join(root, src)));
          if (missing.length) {
            console.error('Missing local scripts referenced by index.html:', missing);
            process.exit(1);
          }
          console.log(`Verified ${scripts.length} local script references.`);
          NODE

      - name: Check JavaScript syntax
        run: find apps/wander-travel -maxdepth 1 -type f -name '*.js' -print0 | xargs -0 -n1 node --check

      - name: Publish to Cloudflare Pages
        working-directory: apps/wander-travel
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler@latest pages deploy . --project-name=wander-travel --branch=main

      - name: Test Google Places API through Wander
        run: |
          mkdir -p debug-results
          endpoint='https://wander-travel.pages.dev/api/places/nearby?lat=19.372667&lng=-69.852783&radius=300'
          for attempt in 1 2 3 4 5 6; do
            status=$(curl --silent --show-error --location --output debug-results/google-places-test.json --write-out '%{http_code}' "$endpoint" || true)
            if [ "$status" = "200" ]; then
              break
            fi
            echo "Attempt $attempt returned HTTP $status"
            sleep 10
          done
          python - <<'PY'
          import json
          path = 'debug-results/google-places-test.json'
          with open(path, encoding='utf-8') as source:
              payload = json.load(source)
          if not payload.get('ok'):
              raise SystemExit(f"Google Places test failed: {payload}")
          print(f"Google Places test returned {payload.get('count', 0)} places")
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add debug-results/google-places-test.json
          if ! git diff --cached --quiet; then
            git commit -m "Record Google Places API test result"
            git push
          fi
