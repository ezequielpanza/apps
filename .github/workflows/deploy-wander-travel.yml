name: Deploy Wander Travel

on:
  push:
    branches: [main]
    paths:
      - "apps/wander-travel/**"
      - ".github/workflows/deploy-wander-travel.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-wander-travel
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Extract Overture places for Nagua
        run: |
          python -m pip install --disable-pip-version-check overturemaps
          mkdir -p apps/wander-travel/data/overture
          overturemaps download \
            --bbox=-69.872,19.355,-69.834,19.390 \
            --type=place \
            --format=geojson \
            --output=apps/wander-travel/data/overture/nagua-places.geojson
          python - <<'PY'
          import json
          path = 'apps/wander-travel/data/overture/nagua-places.geojson'
          with open(path, encoding='utf-8') as source:
              data = json.load(source)
          print(f"Overture Nagua places: {len(data.get('features', []))}")
          PY

      - name: Save Overture test extract
        run: |
          if git diff --quiet -- apps/wander-travel/data/overture/nagua-places.geojson; then
            echo "Nagua extract is unchanged."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/wander-travel/data/overture/nagua-places.geojson
          git commit -m "Update Nagua Overture POI test extract"
          git push

      - name: Verify app shell and local script references
        run: |
          test -s apps/wander-travel/index.html
          test -s apps/wander-travel/wander-ui.css
          test -s apps/wander-travel/wander-icons.svg
          test -s apps/wander-travel/wander-app-icon.svg
          test -s apps/wander-travel/manifest.webmanifest
          test -s apps/wander-travel/sw.js
          test -s apps/wander-travel/app.js
          test -s apps/wander-travel/runtime-version.js
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const root = 'apps/wander-travel';
          const html = fs.readFileSync(path.join(root, 'index.html'), 'utf8');
          const scripts = [...html.matchAll(/<script\s+[^>]*src=["']([^"']+)["']/g)]
            .map((match) => match[1].split('?')[0])
            .filter((src) => !/^https?:\/\//.test(src));
          const missing = scripts.filter((src) => !fs.existsSync(path.join(root, src)));
          if (missing.length) {
            console.error('Missing local scripts referenced by index.html:', missing);
            process.exit(1);
          }
          console.log(`Verified ${scripts.length} local script references.`);
          NODE

      - name: Check JavaScript syntax
        run: find apps/wander-travel -maxdepth 1 -type f -name '*.js' -print0 | xargs -0 -n1 node --check

      - name: Publish to Cloudflare Pages
        working-directory: apps/wander-travel
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler@latest pages deploy . --project-name=wander-travel --branch=main