name: Deploy Wander Travel

on:
  push:
    branches: [main]
    paths:
      - "apps/wander-travel/**"
      - ".github/workflows/deploy-wander-travel.yml"
  schedule:
    - cron: "2,7,12,17,22,27,32,37,42,47,52,57 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-wander-travel
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Read target version
        id: target
        shell: bash
        run: |
          VERSION="$(node -e "const data=require('./apps/wander-travel/version.json'); process.stdout.write(String(data.version || ''))")"
          if [ -z "$VERSION" ]; then
            echo "version.json has no version" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Target version: $VERSION"

      - name: Check production version
        id: production
        shell: bash
        env:
          TARGET_VERSION: ${{ steps.target.outputs.version }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          REMOTE_VERSION=""
          RESPONSE="$(curl -fsSL --max-time 20 "https://wander-travel.pages.dev/version.json?ts=$(date +%s)" 2>/dev/null || true)"
          if [ -n "$RESPONSE" ]; then
            REMOTE_VERSION="$(printf '%s' "$RESPONSE" | node -e "let input=''; process.stdin.on('data', chunk => input += chunk); process.stdin.on('end', () => { try { process.stdout.write(String(JSON.parse(input).version || '')); } catch {} });")"
          fi

          echo "Production version: ${REMOTE_VERSION:-unavailable}"
          if [ "$EVENT_NAME" = "workflow_dispatch" ] || [ "$REMOTE_VERSION" != "$TARGET_VERSION" ]; then
            echo "needs_deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "needs_deploy=false" >> "$GITHUB_OUTPUT"
            echo "Production is already current."
          fi

      - name: Verify app shell and local script references
        if: steps.production.outputs.needs_deploy == 'true'
        run: |
          test -s apps/wander-travel/index.html
          test -s apps/wander-travel/wander-ui.css
          test -s apps/wander-travel/wander-context-rail.css
          test -s apps/wander-travel/wander-icons.svg
          test -s apps/wander-travel/wander-app-icon.svg
          test -s apps/wander-travel/manifest.webmanifest
          test -s apps/wander-travel/version.json
          test -s apps/wander-travel/sw.js
          test -s apps/wander-travel/app.js
          test -s apps/wander-travel/runtime-version.js
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const root = 'apps/wander-travel';
          const html = fs.readFileSync(path.join(root, 'index.html'), 'utf8');
          const scripts = [...html.matchAll(/<script\s+[^>]*src=["']([^"']+)["']/g)]
            .map((match) => match[1].split('?')[0])
            .filter((src) => !/^https?:\/\//.test(src));
          const missing = scripts.filter((src) => !fs.existsSync(path.join(root, src)));
          if (missing.length) {
            console.error('Missing local scripts referenced by index.html:', missing);
            process.exit(1);
          }
          console.log(`Verified ${scripts.length} local script references.`);
          NODE

      - name: Check JavaScript syntax
        if: steps.production.outputs.needs_deploy == 'true'
        run: find apps/wander-travel -maxdepth 1 -type f -name '*.js' -print0 | xargs -0 -n1 node --check

      - name: Run deterministic Wander scenarios
        if: steps.production.outputs.needs_deploy == 'true'
        run: node apps/wander-travel/tests/wander-scenarios.mjs

      - name: Run unified POI engine tests
        if: steps.production.outputs.needs_deploy == 'true'
        run: node apps/wander-travel/tests/poi-source-foundation.mjs

      - name: Run Wikidata connector tests
        if: steps.production.outputs.needs_deploy == 'true'
        run: node apps/wander-travel/tests/wikidata-connector.mjs

      - name: Run OpenStreetMap connector tests
        if: steps.production.outputs.needs_deploy == 'true'
        run: node apps/wander-travel/tests/openstreetmap-connector.mjs

      - name: Run POI consolidation tests
        if: steps.production.outputs.needs_deploy == 'true'
        run: node apps/wander-travel/tests/poi-consolidation.mjs

      - name: Run NearbyProvider field tests
        if: steps.production.outputs.needs_deploy == 'true'
        run: node apps/wander-travel/tests/nearby-provider.mjs

      - name: Run field guide tests
        if: steps.production.outputs.needs_deploy == 'true'
        run: node apps/wander-travel/tests/field-guide.mjs

      - name: Run field guide engine-flow tests
        if: steps.production.outputs.needs_deploy == 'true'
        run: node apps/wander-travel/tests/field-guide-engine-flow.mjs

      - name: Run ContextRail tests
        if: steps.production.outputs.needs_deploy == 'true'
        run: node apps/wander-travel/tests/context-rail.mjs

      - name: Run field test logger tests
        if: steps.production.outputs.needs_deploy == 'true'
        run: node apps/wander-travel/tests/field-test-logger.mjs

      - name: Publish to Cloudflare Pages
        if: steps.production.outputs.needs_deploy == 'true'
        working-directory: apps/wander-travel
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler@latest pages deploy . --project-name=wander-travel --branch=main

      - name: Verify production deployment
        if: steps.production.outputs.needs_deploy == 'true'
        shell: bash
        env:
          TARGET_VERSION: ${{ steps.target.outputs.version }}
        run: |
          for attempt in $(seq 1 18); do
            RESPONSE="$(curl -fsSL --max-time 20 "https://wander-travel.pages.dev/version.json?ts=$(date +%s)" 2>/dev/null || true)"
            REMOTE_VERSION=""
            if [ -n "$RESPONSE" ]; then
              REMOTE_VERSION="$(printf '%s' "$RESPONSE" | node -e "let input=''; process.stdin.on('data', chunk => input += chunk); process.stdin.on('end', () => { try { process.stdout.write(String(JSON.parse(input).version || '')); } catch {} });")"
            fi
            echo "Verification attempt $attempt: ${REMOTE_VERSION:-unavailable}"
            if [ "$REMOTE_VERSION" = "$TARGET_VERSION" ]; then
              echo "Production is serving $TARGET_VERSION"
              exit 0
            fi
            sleep 5
          done
          echo "Cloudflare did not expose $TARGET_VERSION after deployment" >&2
          exit 1
