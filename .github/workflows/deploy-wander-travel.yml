name: Deploy Wander Travel

on:
  push:
    branches: [main]
    paths:
      - "apps/wander-travel/**"
      - "imports/wander-travel-cloudflare-pages.zip"
      - ".github/workflows/deploy-wander-travel.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Import Wander Travel source archive
        if: ${{ hashFiles('imports/wander-travel-cloudflare-pages.zip') != '' }}
        run: |
          rm -rf apps/wander-travel
          mkdir -p apps/wander-travel
          unzip -t imports/wander-travel-cloudflare-pages.zip
          unzip -o imports/wander-travel-cloudflare-pages.zip -d apps/wander-travel
          rm imports/wander-travel-cloudflare-pages.zip
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/wander-travel imports/wander-travel-cloudflare-pages.zip
          git commit -m "Import Wander Travel app source"
          git push

      - name: Verify app files
        run: |
          test -f apps/wander-travel/index.html
          test -f apps/wander-travel/styles.css
          test -f apps/wander-travel/app.js

      - name: Ensure Cloudflare Pages project exists
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx --yes wrangler@latest pages project create wander-travel --production-branch=main || true

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx --yes wrangler@latest pages deploy apps/wander-travel --project-name=wander-travel
