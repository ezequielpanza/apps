name: Deploy Wander Travel

on:
  push:
    branches: [main]
    paths:
      - "apps/wander-travel/**"
      - "sync/wander/**"
      - ".github/workflows/deploy-wander-travel.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare reviewed Drive version
        run: |
          rm -rf /tmp/wander-travel
          mkdir -p /tmp/wander-travel
          cp sync/wander/index/00.part /tmp/wander-travel/index.html
          cat sync/wander/css/00.part sync/wander/css/01.part sync/wander/css/02.part > /tmp/wander-travel/styles.css
          cp sync/wander/js/final.js /tmp/wander-travel/app.js

      - name: Verify source
        run: |
          test -s /tmp/wander-travel/index.html
          test -s /tmp/wander-travel/styles.css
          test -s /tmp/wander-travel/app.js
          node --check /tmp/wander-travel/app.js

      - name: Create Pages project
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler@latest pages project create wander-travel --production-branch=main || true

      - name: Publish
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler@latest pages deploy /tmp/wander-travel --project-name=wander-travel
