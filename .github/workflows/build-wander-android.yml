name: Build Wander Android

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'apps/wander-travel/**'
      - '.github/workflows/build-wander-android.yml'

permissions:
  contents: write

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/wander-travel
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/wander-travel/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - uses: android-actions/setup-android@v3

      - run: npm ci
      - run: npm run android:sync
      - run: ./gradlew assembleDebug
        working-directory: apps/wander-travel/android

      - uses: actions/upload-artifact@v4
        with:
          name: wander-travel-debug-apk
          path: apps/wander-travel/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Publish installable Android test release
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="wander-android-v${VERSION}"
          APK="wander-travel-v${VERSION}-debug.apk"
          cp android/app/build/outputs/apk/debug/app-debug.apk "$APK"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$APK" --clobber
          else
            gh release create "$TAG" "$APK" --prerelease --title "Wander Travel Android v${VERSION}" --notes "APK de prueba para instalación directa en Android."
          fi
